<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Kraiyos Wanna — AI Engineer</title>
  <desc id="desc">A bright technical banner showing a flow from data to models, agents, and real systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.62" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EAF1FF"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#2563EB" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1D4ED8" flood-opacity="0.16"/>
    </filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <path id="flow" d="M 760 275 C 825 160, 910 160, 965 223 S 1080 292, 1134 198"/>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <circle cx="1085" cy="38" r="310" fill="url(#glow)"/>
  <circle cx="720" cy="415" r="210" fill="url(#glow)" opacity="0.55"/>

  <g transform="translate(62 56)">
    <rect width="252" height="32" rx="16" fill="#EFF6FF" stroke="#BFDBFE"/>
    <circle cx="18" cy="16" r="5" fill="#2563EB">
      <animate attributeName="opacity" values="1;.25;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="32" y="21" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.25" fill="#1D4ED8">OPEN TO AI ENGINEERING ROLES</text>
  </g>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="62" y="158" font-size="19" font-weight="700" letter-spacing="4" fill="#2563EB">KRAIYOS WANNA</text>
    <text x="58" y="221" font-size="58" font-weight="800" letter-spacing="-2.5" fill="#0F172A">AI ENGINEER</text>
    <text x="62" y="264" font-size="21" font-weight="500" fill="#475569">From physical systems to intelligent ones.</text>

    <g transform="translate(62 303)" font-size="12" font-weight="700" letter-spacing="0.65">
      <rect width="150" height="38" rx="19" fill="#0F172A"/>
      <text x="75" y="24" text-anchor="middle" fill="#FFFFFF">COMPUTER VISION</text>
      <rect x="160" width="116" height="38" rx="19" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="218" y="24" text-anchor="middle" fill="#334155">DATA + ML</text>
      <rect x="286" width="108" height="38" rx="19" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="340" y="24" text-anchor="middle" fill="#334155">LLM / RAG</text>
      <rect x="404" width="121" height="38" rx="19" fill="#2563EB"/>
      <text x="464.5" y="24" text-anchor="middle" fill="#FFFFFF">AGENTIC AI</text>
    </g>
  </g>

  <g>
    <path d="M 760 275 C 825 160, 910 160, 965 223 S 1080 292, 1134 198" fill="none" stroke="#93C5FD" stroke-width="2.5" stroke-dasharray="7 8"/>
    <circle r="12" fill="#60A5FA" opacity="0.18" filter="url(#soft)">
      <animateMotion dur="4.7s" repeatCount="indefinite" rotate="auto">
        <mpath href="#flow"/>
      </animateMotion>
    </circle>
    <circle r="5" fill="#2563EB">
      <animateMotion dur="4.7s" repeatCount="indefinite" rotate="auto">
        <mpath href="#flow"/>
      </animateMotion>
    </circle>
  </g>

  <g font-family="Inter,Segoe UI,Arial,sans-serif" text-anchor="middle" filter="url(#shadow)">
    <g transform="translate(765 278)">
      <circle r="38" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
      <circle r="9" fill="#2563EB"/>
      <text y="63" font-size="11" font-weight="800" letter-spacing="1.4" fill="#475569">DATA</text>
    </g>
    <g transform="translate(865 180)">
      <circle r="43" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
      <path d="M-14 4L0-12 14 4 0 17Z" fill="none" stroke="#2563EB" stroke-width="3" stroke-linejoin="round"/>
      <text y="69" font-size="11" font-weight="800" letter-spacing="1.4" fill="#475569">MODEL</text>
    </g>
    <g transform="translate(975 233)">
      <circle r="48" fill="#2563EB"/>
      <path d="M-17-8h34M-17 0h34M-17 8h22" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
      <circle cx="13" cy="8" r="5" fill="#93C5FD"/>
      <text y="76" font-size="11" font-weight="800" letter-spacing="1.4" fill="#1D4ED8">AGENT</text>
    </g>
    <g transform="translate(1130 198)">
      <circle r="42" fill="#0F172A"/>
      <path d="M-14 12V-8l14-8 14 8v20zM0-16v28" fill="none" stroke="#FFFFFF" stroke-width="2.8" stroke-linejoin="round"/>
      <text y="67" font-size="11" font-weight="800" letter-spacing="1.4" fill="#334155">SYSTEM</text>
    </g>
  </g>

  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1.1">
    <text x="1138" y="375" text-anchor="end">BANGKOK · THAILAND</text>
  </g>
  <rect y="412" width="1200" height="8" rx="4" fill="url(#blue)"/>
</svg>
